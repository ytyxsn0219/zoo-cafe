models:
  - name: "gpt4o_model"
    provider: "openai"
    model: "gpt-4o"
    description: "OpenAI GPT-4o"
    config:
      temperature: 0.7
      max_tokens: 4096
      timeout: 60
      retry:
        max_attempts: 3
        backoff_factor: 2

  - name: "claude35_model"
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    description: "Anthropic Claude 3.5 Sonnet"
    config:
      temperature: 0.5
      max_tokens: 8192
      timeout: 90
      retry:
        max_attempts: 3
        backoff_factor: 2

  - name: "deepseek_model"
    provider: "deepseek"
    model: "deepseek-reasoner"
    description: "DeepSeek Reasoner"
    config:
      temperature: 0.5
      max_tokens: 4096
      timeout: 120
      retry:
        max_attempts: 3
        backoff_factor: 2

  - name: "cheap_model"
    provider: "openai"
    model: "gpt-4o-mini"
    description: "OpenAI GPT-4o-mini (低成本)"
    config:
      temperature: 0.3
      max_tokens: 2000
      timeout: 30
      retry:
        max_attempts: 2
        backoff_factor: 1
