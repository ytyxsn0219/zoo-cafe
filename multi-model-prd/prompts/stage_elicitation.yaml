stage_name: "elicitation"
description: "需求澄清阶段"

objectives:
  - "识别用户需求的模糊之处"
  - "提出关键澄清问题"
  - "生成需求澄清问卷"

instructions: |
  1. 主持人首先介绍阶段目标
  2. 各 Agent 依次提出 3-5 个关键问题
  3. Agent 之间相互评审问题的质量
  4. 根据反馈优化问题列表
  5. 主持人整合优质问题，生成《需求澄清问卷》

max_turns: 5

output_format: |
  ## 需求澄清问卷

  ### 问题列表
  1. [问题1]
  2. [问题2]
  ...

  ### 预期用户回答
  - [问题1的预期答案格式]
  - [问题2的预期答案格式]
