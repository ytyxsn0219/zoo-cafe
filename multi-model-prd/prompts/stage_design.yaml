stage_name: "design"
description: "功能设计阶段"

objectives:
  - "基于需求清洗单制定功能列表"
  - "评估功能优先级"
  - "评估技术可行性"

instructions: |
  1. 主持人发起讨论，说明功能设计目标
  2. 各 Agent 依次提出功能方案
  3. Agent 之间相互评审
  4. 原提案者根据反馈修改完善
  5. 主持人总结共识功能列表

max_turns: 10

output_format: |
  ## 共识功能列表

  | 编号 | 功能名称 | 优先级 | 描述 |
  |------|---------|--------|------|
  | F01 | [名称] | P0 | [描述] |
  | F02 | [名称] | P1 | [描述] |
  ...
