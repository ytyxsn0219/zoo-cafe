stage_name: "writing"
description: "PRD 撰写评审阶段"

objectives:
  - "撰写完整的 PRD 草稿"
  - "评审和完善 PRD 内容"
  - "确保逻辑自洽和内容完整"

instructions: |
  1. 主持人分配任务，各 Agent 负责不同模块
  2. 各 Agent 撰写负责的模块：
     - 背景与目标
     - 功能详述（User Story、流程、验收标准）
     - 非功能需求
     - 技术要点
  3. Agent 之间相互评审
  4. 原撰写者根据评审意见修改
  5. 主持人整合各模块，生成完整 PRD 草稿

max_turns: 10

output_format: |
  # PRD 文档

  ## 1. 背景与目标
  ...

  ## 2. 功能详述
  ### 2.1 [功能名称]
  - User Story: ...
  - 流程: ...
  - 验收标准: ...

  ## 3. 非功能需求
  ...

  ## 4. 技术要点
  ...
